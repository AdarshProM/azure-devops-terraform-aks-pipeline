trigger:
  branches:
    include:
      - main

variables:
- group: keyvault-secrets

stages:

- stage: Infrastructure
  displayName: 'Stage 1 — Terraform Provision'
  jobs:
  - job: TerraformApply
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Apply'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'

- stage: Build
  displayName: 'Stage 2 — Docker Build & Push to ACR'
  dependsOn: Infrastructure
  jobs:
  - job: DockerBuild
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Docker@2
      displayName: 'Build and Push Image to ACR'
      inputs:
        containerRegistry: 'adarsh-acr-connection'
        repository: 'demo-app'
        command: 'buildAndPush'
        tags: |
          $(Build.BuildId)
          latest

- stage: Deploy
  displayName: 'Stage 3 — Deploy to AKS'
  dependsOn: Build
  jobs:
  - deployment: DeployToAKS
    environment: 'production'
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: KubernetesManifest@1
            displayName: 'Rolling Deployment to AKS'
            inputs:
              action: 'deploy'
              connectionType: 'azureResourceManager'
              manifests: '$(Pipeline.Workspace)/k8s/deployment.yaml'
              containers: |
                adarshdemoacr.azurecr.io/demo-app:$(Build.BuildId)
